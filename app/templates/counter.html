<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>W9 API Counter</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #17202a;
      background: #f4f7fb;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
    }

    main {
      width: min(100%, 420px);
      padding: 28px;
      border: 1px solid #d7dee8;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 18px 45px rgba(23, 32, 42, 0.12);
    }

    .eyebrow {
      color: #5f6f89;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 8px 0 14px;
      font-size: 1.7rem;
      line-height: 1.2;
    }

    .status {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      justify-content: space-between;
      color: #52616f;
      font-size: 0.92rem;
    }

    .count {
      margin: 30px 0;
      color: #0f766e;
      font-size: 4.8rem;
      font-weight: 800;
      line-height: 1;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    button {
      width: 100%;
      min-height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 0;
      border-radius: 8px;
      color: #ffffff;
      background: #0f766e;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #115e59;
    }

    button:disabled {
      cursor: progress;
      opacity: 0.7;
    }

    .button-icon {
      display: inline-grid;
      width: 24px;
      height: 24px;
      place-items: center;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      font-size: 1.1rem;
    }

    .message {
      min-height: 22px;
      margin: 16px 0 0;
      color: #52616f;
      font-size: 0.9rem;
      text-align: center;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      main {
        padding: 22px;
      }

      .count {
        font-size: 3.6rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">W9 API</div>
    <h1>Counter demo</h1>
    <div class="status">
      <span id="version">Version loading</span>
      <span id="service">Backend syncing</span>
    </div>
    <div class="count" id="count" aria-live="polite">0</div>
    <button id="countButton" type="button">
      <span class="button-icon" aria-hidden="true">+</span>
      <span>Count click</span>
    </button>
    <p class="message" id="message" aria-live="polite">Ready</p>
  </main>

  <script>
    const countEl = document.querySelector("#count");
    const versionEl = document.querySelector("#version");
    const serviceEl = document.querySelector("#service");
    const messageEl = document.querySelector("#message");
    const buttonEl = document.querySelector("#countButton");

    async function requestCounter(method = "GET") {
      const response = await fetch("/api/counter", {
        method,
        headers: { "Accept": "application/json" }
      });

      if (!response.ok) {
        throw new Error("Backend request failed");
      }

      return response.json();
    }

    function renderCounter(data) {
      countEl.textContent = data.count;
      versionEl.textContent = `Version ${data.version}`;
      serviceEl.textContent = `${data.service} ${data.status}`;
    }

    async function loadCounter() {
      messageEl.textContent = "Syncing with backend";
      try {
        renderCounter(await requestCounter());
        messageEl.textContent = "Ready";
      } catch (error) {
        messageEl.textContent = "Backend unavailable";
      }
    }

    buttonEl.addEventListener("click", async () => {
      buttonEl.disabled = true;
      messageEl.textContent = "Saving click";
      try {
        renderCounter(await requestCounter("POST"));
        messageEl.textContent = "Saved by backend";
      } catch (error) {
        messageEl.textContent = "Could not save click";
      } finally {
        buttonEl.disabled = false;
      }
    });

    loadCounter();
  </script>
</body>
</html>
