      rules:
        - alert: ApiFastBurnRateTest
          expr: |
            (
              sum(rate(flask_http_request_total{namespace="demo", app="api", status=~"5.."}[1m]))
              /
              clamp_min(sum(rate(flask_http_request_total{namespace="demo", app="api"}[1m])), 1)
            ) > 0.02
          for: 30s
          labels:
            severity: critical
          annotations:
            summary: API fast burn rate test is firing
            description: API 5xx rate is above 2 percent for quick Alertmanager testing.