apiVersion: argoproj.io/v1alpha1
kind: Rollout            # argoproj.io/v1alpha1
metadata: { name: api, namespace: demo, labels: { app: api } }
spec:
  replicas: 4
  selector: { matchLabels: { app: api } }
  template:
    metadata: { labels: { app: api } }
    spec:
      containers:
      - name: api
        image: w9-api:3
        imagePullPolicy: IfNotPresent
        ports: [ { name: http, containerPort: 8080 } ]
        env:
        - { name: ERROR_RATE, value: "0.8" }
        - { name: VERSION,    value: "v3" }
        readinessProbe: { httpGet: { path: /healthz, port: 8080 } }
  strategy:
    canary:                  # Lab 4 dùng tới
      steps:
      - setWeight: 25
      - pause: { duration: 60s }
      - analysis:
          templates:
          - templateName: api-success-rate
          args:
          - name: service-name
            value: api
      - setWeight: 50
      - pause: { duration: 60s }
      - analysis:
          templates:
          - templateName: api-success-rate
          args:
          - name: service-name
            value: api
      - setWeight: 100
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: demo
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 8080
      targetPort: http
